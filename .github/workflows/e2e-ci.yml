name: E2E CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15.0"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Make Maven wrapper executable
        run: chmod +x apps/api/mvnw

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Start local Supabase
        run: supabase start

      - name: Prepare local API environment
        working-directory: apps/api
        shell: pwsh
        run: ./scripts/prepare-local-api-env.ps1 -OutputFile .env.local.ci

      - name: Reset local Supabase database
        working-directory: apps/api
        shell: pwsh
        run: ./scripts/reset-local-supabase.ps1 -EnvFile .env.local.ci -OverrideEnv

      - name: Prepare local web environment
        working-directory: apps/web
        shell: pwsh
        run: ./scripts/prepare-local-web-env.ps1

      - name: Start API
        working-directory: apps/api
        shell: bash
        run: |
          nohup ./mvnw -B -ntp spring-boot:run > api.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: apps/web
        env:
          API_BASE_URL: http://localhost:8080
        run: npm run e2e

      - name: Upload API log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: apps/api/api.log
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          if-no-files-found: ignore
