name: API CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  maven-test:
    name: Maven test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
        working-directory: .

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Start local Supabase
        run: supabase start --exclude logflare,vector,realtime,edge-runtime,imgproxy,postgrest,supavisor

      - name: Prepare local API environment
        shell: pwsh
        run: ./supabase/scripts/prepare-local-api-env.ps1 -OutputFile .env.local.ci

      - name: Reset local Supabase database
        shell: pwsh
        run: ./supabase/scripts/reset-local-supabase.ps1 -EnvFile .env.local.ci -OverrideEnv

      - name: Run tests
        run: ./mvnw -B -ntp test

      - name: Clean up generated local environment
        if: always()
        shell: pwsh
        run: Remove-Item -Force -ErrorAction SilentlyContinue .env.local.ci, supabase/supabase-status.env
