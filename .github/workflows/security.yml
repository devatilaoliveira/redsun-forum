name: Security CI

on:
  workflow_dispatch:
    inputs:
      base-ref:
        description: "Base ref for dependency review comparison"
        required: false
        default: "main"
      head-ref:
        description: "Head ref for dependency review comparison. Defaults to the selected workflow branch."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          base-ref: ${{ inputs['base-ref'] }}
          head-ref: ${{ inputs['head-ref'] || github.ref_name }}
          fail-on-severity: high

  repository-scan:
    name: Trivy repository scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repository
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repository-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload repository scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-repository-results.sarif
          category: trivy-repository

  api-image-scan:
    name: Trivy API image scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          push: false
          tags: redsun-api:security-scan

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: redsun-api:security-scan
          format: sarif
          output: trivy-api-image-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload API image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api-image-results.sarif
          category: trivy-api-image
