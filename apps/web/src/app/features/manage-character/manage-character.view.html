<section class="manage-character-view">
  <rs-view-header
    [title]="headerTitleKey() | translate"
    [subTittle]="headerSubtitleKey() | translate"
  />

  <div class="content" [class.content--wide]="isRedSunSheet()">
    @if (sheetLoading()) {
      <div class="status">
        <rs-spinner [variant]="EVariant.PRIMARY" />
      </div>
    } @else {
      <div class="sheet-content">
        <form class="form" [formGroup]="characterSheetFormGroup" (submit)="$event.preventDefault(); onSheetButtonPressed()">
          <div class="avatar-field avatar-field--hero">
            <rs-avatar
              [src]="avatarImageSrc()"
              [userName]="controls.characterName.value || null"
              [size]="200"
              [uploadable]="sheetEditable()"
              [deletable]="false"
              (fileSelected)="onAvatarFileSelected($event)"
            />
          </div>

          <div class="character-fields">
            <rs-input
              [label]="'CHARACTER_SHEET_NAME' | translate"
              [maxLength]="40"
              [placeholder]="'CHARACTER_SHEET_NAME_PLACEHOLDER' | translate"
              [value]="controls.characterName.value"
              [blocked]="!sheetEditable()"
              (valueChanged)="onValueChange(controls.characterName, $event)"
            />

            <rs-textarea
              [label]="'CHARACTER_SHEET_DESCRIPTION' | translate"
              [maxLength]="500"
              [placeholder]="'CHARACTER_SHEET_DESCRIPTION_PLACEHOLDER' | translate"
              [rows]="8"
              [value]="controls.characterDescription.value"
              [blocked]="!sheetEditable()"
              (valueChanged)="onValueChange(controls.characterDescription, $event)"
            />
          </div>
        </form>

        @if (isRedSunSheet()) {
          <rs-redsun-sheet [sheet]="redSunSheet()" [sheetEditable]="sheetEditable()" />
        }

        @if (canQuitTale()) {
          <rs-button
            class="quit-button"
            [variant]="EVariant.WARNING"
            [inProgress]="leavingInProgress()"
            (pressed)="onQuitPressed()"
          >
            {{ 'QUIT_TALE' | translate }}
          </rs-button>
        }
      </div>
    }
  </div>

  @if (!sheetLoading()) {
    <rs-round-icon-button
      class="sheet-edit-button"
      [iconSrc]="sheetButtonIcon()"
      [ariaLabel]="sheetButtonLabel()"
      [disabled]="saveInProgress() || avatarUploading()"
      [variant]="EVariant.PRIMARY"
      (pressed)="onSheetButtonPressed()"
    />
  }
</section>

@if (confirmQuitOpen()) {
  <rs-dialog-modal
    [title]="'QUIT_TALE' | translate"
    [ctaBtnOne]="{ label: ('CANCEL' | translate), variant: EVariant.SECONDARY, disabled: leavingInProgress() }"
    [ctaBtnTwo]="{ label: ('CONFIRM' | translate), variant: EVariant.WARNING, disabled: leavingInProgress(), inProgress: leavingInProgress() }"
    (closePressed)="closeQuitConfirm()"
    (ctaBtnOnePressed)="closeQuitConfirm()"
    (ctaBtnTwoPressed)="confirmQuit()"
  >
    <ng-template>
      <p>{{ 'QUIT_TALE_CONFIRM_MESSAGE' | translate }}</p>
    </ng-template>
  </rs-dialog-modal>
}

@if (avatarCropOpen()) {
  <rs-image-crop-dialog
    [imageFile]="avatarCropFile()"
    [cropProcessing]="avatarUploading()"
    [saveDisabled]="!avatarCropBlob()"
    [aspectRatio]="1"
    [roundCropper]="true"
    [resizeToWidth]="200"
    [resizeToHeight]="200"
    (cropped)="onAvatarCropped($event)"
    (closed)="closeAvatarCrop()"
    (confirmed)="confirmAvatarCrop()"
  />
}
