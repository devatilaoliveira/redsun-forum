<section class="location-view">
  <rs-view-header
    [title]="(isEditMode() ? 'EDIT_LOCATION' : 'CREATE_LOCATION') | translate "
    [subTittle]="'LOCATION_SUBTITLE' | translate"
  />

  <div class="content">
    @if (isLoading()) {
      <div class="loading">
        <rs-spinner [variant]="EVariant.PRIMARY" />
      </div>
    } @else {
      <form class="form" [formGroup]="createNewLocationFormGroup" (submit)="$event.preventDefault(); onSubmit()">
        <rs-input
          testId="location-form-name-input"
          [label]="'LOCATION_NAME' | translate"
          [placeholder]="'LOCATION_NAME_PLACEHOLDER' | translate"
          [required]="true"
          [value]="locationFormControls.locationName.value"
          [pattern]="locationNamePattern"
          [errorMessage]="'NAME_ERROR' | translate"
          (valueChanged)="onNameChange($event)"
        />

        <rs-textarea
          testId="location-form-description-input"
          [label]="'LOCATION_DESCRIPTION' | translate"
          [placeholder]="'DESCRIPTION_YOUR_LOCATION' | translate"
          [maxLength]="UTIL_CONSTANTS.LONG_TEXT_LENGTH"
          [required]="true"
          [value]="locationFormControls.description.value"
          (valueChanged)="onDescriptionChange($event)"
        />

        <rs-image-preview
          [src]="imagePreview()"
          [alt]="'UPLOAD_LOCATION_IMAGE' | translate"
          [height]="405"
          [uploadable]="true"
          (fileSelected)="onImageSelected($event)"
          (imageCleared)="onImageCleared()"
        />

        <div class="cta-btn">
          <rs-button
            testId="location-form-submit"
            [inProgress]="inProgress()"
            (pressed)="onSubmit()"
            [disabled]="!canSubmit()"
          >
            {{ (isEditMode() ? 'SAVE_CHANGES' : 'LOCATION_SUBMIT') | translate }}
          </rs-button>
        </div>
      </form>
    }
  </div>
</section>

@if (imageCropOpen()) {
  @defer (when imageCropOpen()) {
    <rs-image-crop-dialog
      [imageFile]="imageCropFile()"
      [cropProcessing]="cropProcessing()"
      [saveDisabled]="!imageCropBlob()"
      (cropped)="onImageCropped($event)"
      (closed)="closeImageCrop()"
      (confirmed)="confirmImageCrop()"
    />
  }
}
