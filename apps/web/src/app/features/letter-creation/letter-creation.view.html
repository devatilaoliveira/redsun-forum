<section class="letter-view">
  <rs-view-header
    [title]="'SEND_LETTER' | translate"
    [subTittle]="'LETTER_SUBTITLE' | translate"
  />

  <div class="content">
    <form class="form" [formGroup]="letterFormGroup" (submit)="$event.preventDefault(); onSubmit()">
      @if (!hasContactId()) {
        <rs-contacts-multi-select
          [label]="'RECIPIENTS' | translate"
          [placeholder]="'SEARCH_CONTACTS' | translate"
          [contacts]="myContacts()"
          [value]="letterControls.recipientsIds.value"
          [required]="true"
          (valueChanged)="onRecipientsChange($event)"
        />
      }

      <rs-input
        [label]="'SUBJECT' | translate"
        [placeholder]="'ADD_SUBJECT' | translate"
        [required]="true"
        [value]="letterControls.subject.value"
        (valueChanged)="onSubjectChange($event)"
      />

      <rs-textarea
        [label]="'CONTENT' | translate"
        [placeholder]="'WRITE_YOUR_LETTER' | translate"
        [maxLength]="UTIL_CONSTANTS.EXTRA_LONG_TEXT_LENGTH"
        [required]="true"
        [value]="letterControls.content.value"
        (valueChanged)="onContentChange($event)"
      />

      <div class="cta-btn">
        <rs-button
          [inProgress]="inProgress()"
          [disabled]="letterFormGroup.invalid || inProgress()"
          (pressed)="onSubmit()"
        >
          {{ 'SEND' | translate }}
        </rs-button>
      </div>
    </form>
  </div>
</section>
