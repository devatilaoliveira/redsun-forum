<rs-box class="tale-details-card" [minHeight]="420">
  <div class="cover">
    <button
      class="favorite-button"
      type="button"
      [class.favorite-button--selected]="isFavorite()"
      [attr.aria-label]="favoriteLabel()"
      [attr.aria-pressed]="isFavorite()"
      [disabled]="favoriteSaving()"
      (click)="onFavoritePressed()"
    >
      <svg class="favorite-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <use href="/assets/svgs/favorite.svg#favorite-heart"></use>
      </svg>
    </button>
    @if (hasImage()) {
      <rs-img
        class="card-image"
        [src]="tale().imageUrl!"
        [alt]="tale().taleName + ' cover'"
        loading="lazy"
        decoding="async"
      />
    } @else {
      <div class="placeholder">
        <span class="initials">{{ initials() }}</span>
      </div>
    }
    <div class="cover-heading">
      <h2 class="title" [title]="tale().taleName">{{ tale().taleName }}</h2>
    </div>
  </div>

  <div class="body">
    <rs-expandable-text
      class="description"
      [text]="tale().description || ('NO_DESCRIPTION' | translate)"
      [maxLines]="6"
    />

    <div class="info">
      <rs-divider
        class="info-divider"
        type="gradient"
        [theme]="ETheme.DARK"
      />

      <button
        class="stat stat--action"
        type="button"
        (click)="navigateToTaleOwner()"
      >
        <span class="stat-dot-slot">
          <rs-dot [variant]="EVariant.PRIMARY" />
        </span>
        <div class="stat-copy">
          <span class="stat-label stat-label--action">{{ 'TALE_OWNER' | translate }}</span>
          <span class="stat-value" [title]="ownerName()">{{ ownerName() }}</span>
        </div>
      </button>

      <button
        class="stat stat--action"
        type="button"
        [disabled]="!latestActiveLocation()"
        (click)="navigateToLatestActiveLocation()"
      >
        <span class="stat-dot-slot">
          <rs-dot [variant]="lastActiveVariant()" />
        </span>
        <div class="stat-copy">
          <span class="stat-label stat-label--action">{{ 'LAST_ACTIVE' | translate }}</span>
          <time class="stat-value" [dateTime]="tale().lastTimeActive!">
            {{ tale().lastTimeActive | date:'y MMMM d' }}
          </time>
        </div>
      </button>

      <div class="stat">
        <span class="stat-dot-slot">
          <rs-dot [variant]="EVariant.PRIMARY" />
        </span>
        <div class="stat-copy">
          <span class="stat-label">{{ 'CREATED_ON' | translate }}</span>
          <time class="stat-value" [dateTime]="tale().creationDate">
            {{ tale().creationDate | date:'y MMMM d' }}
          </time>
        </div>
      </div>
    </div>
  </div>
</rs-box>

@if (favoriteDialogMode()) {
  <rs-dialog-modal
    [title]="favoriteDialogTitle()"
    [ctaBtnOne]="cancelFavoriteCta()"
    [ctaBtnTwo]="confirmFavoriteCta()"
    (closePressed)="closeFavoriteDialog()"
    (ctaBtnOnePressed)="closeFavoriteDialog()"
    (ctaBtnTwoPressed)="confirmFavoriteChange()"
  >
    <ng-template>
      <p>{{ favoriteDialogMessage() }}</p>
    </ng-template>
  </rs-dialog-modal>
}
