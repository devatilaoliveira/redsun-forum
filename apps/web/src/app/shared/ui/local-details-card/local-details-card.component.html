<rs-box class="card" [minHeight]="hasImage() ? 320 : null">
  @if (hasImage()) {
    <div class="cover">
      <rs-img
        class="image"
        [ngSrc]="location().imageUrl!"
        [alt]="location().locationName"
        [sizes]="locationImageSizes"
        priority="high"
        fill
        loading="eager"
      />
    </div>
  }

  <div class="body">
    <div class="content">
      <div class="info">
        <div class="author">
          <a class="author-avatar-link" [routerLink]="authorProfileLink()" [attr.aria-label]="authorName()">
            <rs-avatar [src]="location().author.characterImageUrl" [userName]="location().author.characterName" [size]="40"/>
          </a>
          <h2>{{ authorName() }}</h2>
        </div>
        <p class="muted">
          @if (location().lastTimeActive) {
            {{ location().lastTimeActive | date:'y MMMM d' }}
          } @else {
            -
          }
        </p>
      </div>
      <rs-expandable-text
        [text]="location().description || ('NO_DESCRIPTION' | translate)"
        [maxLines]="6"
      />
    </div>
  </div>
</rs-box>
