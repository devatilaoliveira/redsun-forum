<rs-dialog-modal
  [title]="'CROP_IMAGE' | translate"
  [ctaBtnOne]="{ label: ('CANCEL' | translate), variant: EVariant.SECONDARY, disabled: cropProcessing() }"
  [ctaBtnTwo]="{ label: ('SAVE' | translate), variant: EVariant.PRIMARY, disabled: saveDisabled() || cropProcessing(), inProgress: cropProcessing() }"
  (closePressed)="onClose()"
  (ctaBtnOnePressed)="onClose()"
  (ctaBtnTwoPressed)="onConfirm()"
>
  <ng-template>
    <div class="image-cropper">
      <image-cropper
        [imageFile]="imageFile()"
        [maintainAspectRatio]="true"
        [aspectRatio]="aspectRatio()"
        [roundCropper]="roundCropper()"
        [resizeToWidth]="resizeToWidth()"
        [resizeToHeight]="resizeToHeight()"
        [onlyScaleDown]="true"
        [output]="'blob'"
        [format]="'jpeg'"
        [imageQuality]="92"
        (imageCropped)="onImageCropped($event)"
      ></image-cropper>
    </div>
  </ng-template>
</rs-dialog-modal>
