<div class="rs-textarea" [class.is-blocked]="blocked()">
  @if (label()) {
    <label class="label" [attr.for]="textareaId()">
      <span class="label-text">{{ label() }}</span>
      @if (required()) {
        <span class="required">*</span>
      }
    </label>
  }

  <textarea
    [class.is-invalid]="isInvalid()"
    [id]="textareaId()"
    [attr.placeholder]="placeholder()"
    [attr.rows]="rows()"
    [attr.aria-invalid]="isInvalid()"
    [attr.aria-describedby]="describedBy()"
    [attr.readonly]="blocked() ? '' : null"
    [attr.aria-readonly]="blocked()"
    [attr.maxlength]="maxLengthAttr()"
    [value]="currentValue()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  ></textarea>

  <div class="meta">
    <p
      class="error"
      [class.is-visible]="showError()"
      [id]="errorId()"
      [attr.aria-live]="showError() ? 'polite' : null"
    >
      {{ showError() ? validationError() : "" }}
    </p>
    @if (maxLengthAttr()) {
      <p class="counter" [id]="counterId()">
        {{ 'RS_TEXTAREA_CHARACTER_LIMIT' | translate: { currentLength: currentLength(), maxLength: maxLengthAttr() } }}
      </p>
    }
  </div>
</div>
