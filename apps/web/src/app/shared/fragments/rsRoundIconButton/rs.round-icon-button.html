<button
  type="button"
  class="rs-round-icon-button"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-expanded]="ariaExpanded()"
  [attr.aria-controls]="ariaControls()"
  [style.--rs-icon-size.px]="size()"
  [disabled]="disabled()"
  (click)="onClick()"
>
  <span
    class="icon"
    [style.maskImage]="'url(' + iconSrc() + ')'"
    [style.webkitMaskImage]="'url(' + iconSrc() + ')'"
  ></span>
</button>
