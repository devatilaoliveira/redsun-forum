<div class="options-menu" [class.open]="isOpen()">
  <rs-button-text
    [variant]="EVariant.BLACK"
    [ariaHasPopup]="'menu'"
    [ariaExpanded]="isOpen()"
    (pressed)="toggle()"
  >
    @if (iconSrc(); as src) {
      <span
        rsButtonIcon
        class="options-menu__icon"
        aria-hidden="true"
        [style.--rs-options-icon]="'url(' + src + ')'"
      ></span>
    }
    {{ label() }}
  </rs-button-text>

  @if (isOpen()) {
    <div class="menu" role="menu">
      @for (option of items(); track option.value) {
        <button
          type="button"
          class="item"
          [class.selected]="isSelected(option)"
          [disabled]="option.disabled"
          [attr.role]="optionRole()"
          [attr.aria-checked]="selectedValue() === null ? null : isSelected(option)"
          (click)="selectOption(option)"
        >
          <span class="item__label">{{ option.label }}</span>
          @if (isSelected(option)) {
            <img class="item__check" ngSrc="/assets/svgs/check.svg" alt="" aria-hidden="true" width="14" height="14"/>
          }
        </button>
      }
    </div>
  }
</div>
