<div class="rs-dice-input">
  <div class="label-wrapper">
    @if (label()) {
      <label class="label" [attr.for]="firstActionId()">
        <span class="label-text">{{ label() }}</span>
      </label>
    }
  </div>

  <div class="dice-list">
    @for (entry of entries(); track entry.id; let index = $index) {
      <div class="container" [class.is-disabled]="disabled()">
        <div class="dice-name">
          <rs-input
            [placeholder]="actionPlaceholderKey(index) | translate"
            [maxLength]="60"
            [id]="actionId(entry)"
            [blocked]="disabled()"
            [value]="entry.value.action"
            (valueChanged)="onActionChange(entry.id, $event)"
            [hideErrorMessages]="true"
          >
          </rs-input>
        </div>
        <div class="dice-count">
          <rs-number
            [maxValue]="1"
            [id]="countId(entry)"
            [blocked]="disabled()"
            [value]="diceCountValue(entry)"
            (valueChanged)="onDiceCountChange(entry.id, $event)"
          >
          </rs-number>
        </div>
        <div class="dice-select">
          <rs-select
            [id]="typeId(entry)"
            [optionsEnum]="diceOptions"
            [value]="entry.value.diceType"
            [disabled]="disabled()"
            [allowNull]="false"
            (valueChanged)="onDiceTypeChange(entry.id, $event)"
            [localizationPrefix]="'DICE_'">
          </rs-select>
        </div>
      </div>
    }
  </div>
</div>
