name: redsun-web
services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    image: redsun-web:latest
    container_name: redsun-web
    ports:
      - "4200:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - rs-net

networks:
  rs-net:
    external: true
