spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: redsun-spring
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  brevo:
    api-key: ${BREVO_API_KEY:}
    sender-email: ${BREVO_SENDER_EMAIL:}
    sender-name: ${BREVO_SENDER_NAME}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.1-flash-lite}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

supabase:
  bucket:
    avatars: avatars
    tales: tales
    locations: locations
    characters: characters

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
