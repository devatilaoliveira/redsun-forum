name: redsun-api
services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: redsun-api:latest
    container_name: redsun-api
    env_file:
      - ${APP_ENV_FILE:-.env.local}
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - rs-net

networks:
  rs-net:
    external: true
